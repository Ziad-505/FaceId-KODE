name: Deploy KODE Face-ID Portal

# Single-server internal deploy. The self-hosted runner lives ON the IIS server
# and runs as the same account that owns the PM2 process (Administrator), so it
# can update the live clone, rebuild, and reload PM2 in place.
#
# It deploys by operating directly on the existing server clone (DEPLOY_DIR) —
# NOT the runner's _work checkout — so the backend keeps its untracked .env
# (DB creds + JWT secret) and the frontend builds straight into the IIS folder.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, windows, kode-portal]

    env:
      # The live clone on the server. Backend runs from here; .env lives here.
      DEPLOY_DIR: 'C:\Users\Administrator\Desktop\FaceId-KODE\FaceId-KODE'
      # IIS site root (served on :88). This is <DEPLOY_DIR>\dist.
      SITE_DIR: 'C:\Users\Administrator\Desktop\FaceId-KODE\FaceId-KODE\dist'
      # Frontend build-time variables (baked into the bundle by Vite).
      # VITE_API_BASE left blank => frontend calls relative /api, proxied by IIS to AEOS.
      # VITE_PORTAL_API should be /portal-api (the IIS rewrite to the local backend).
      VITE_API_BASE: ${{ vars.VITE_API_BASE }}
      VITE_PORTAL_API: ${{ vars.VITE_PORTAL_API }}

    steps:
      - name: Update server clone to latest main
        shell: powershell
        run: |
          cd "$env:DEPLOY_DIR"
          git fetch origin
          git reset --hard origin/main   # .env / node_modules / dist are untracked and survive

      - name: Backend — install, test, migrate
        shell: powershell
        run: |
          cd "$env:DEPLOY_DIR\backend"
          npm ci
          npm test
          npm run migrate

      - name: Frontend — install and build
        shell: powershell
        run: |
          cd "$env:DEPLOY_DIR\frontend"
          npm ci
          npm run build

      - name: Publish frontend to IIS folder
        shell: powershell
        run: |
          cd "$env:DEPLOY_DIR"
          robocopy "frontend\dist" "$env:SITE_DIR" /MIR /NFL /NDL /NJH /NJS /NP
          $rc = $LASTEXITCODE              # robocopy: 0-7 = success, 8+ = error
          Copy-Item "frontend\web.config" "$env:SITE_DIR\web.config" -Force
          if ($rc -ge 8) { exit $rc } else { exit 0 }

      - name: Reload backend under PM2 (in place, keeps .env)
        shell: powershell
        run: |
          cd "$env:DEPLOY_DIR\backend"
          pm2 startOrReload ecosystem.config.cjs --update-env
          pm2 save
